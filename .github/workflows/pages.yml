name: Deploy ELEMENTAL RUN to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out game files
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare static game
        shell: bash
        run: |
          mkdir -p _site
          cp -R \
            index.html \
            browser-config.js \
            browser-platform.js \
            browser-platform.css \
            manifest.webmanifest \
            service-worker.js \
            assets \
            "elemental run icons" \
            vendor \
            .nojekyll \
            _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload game
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy game
        id: deployment
        uses: actions/deploy-pages@v4
